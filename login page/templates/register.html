<!DOCTYPE html>
<html lang="en">
<head>
   <link rel="stylesheet" href="{{ url_for('static', filename='ooo.css') }}">
   <title>{{ name }}</title>
</head>
<body>
    <h1>{{ name }}</h1>
    <h2>Username</h2>
    <h3>Password</h3>
    <form id="registerForm">
       <input type="text" id="userInput" placeholder="username" required>
       <input type="password" id="pwInput" placeholder="password" required>
       <input type="text" id="roleInput" placeholder="role" required>
       <button type="submit">submit</button>
    </form>

    <p id="response">
      <span id="message"></span>
      <span id="credentials"></span>
      <span id="role"></span>
    </p>
    <nav>
       <a href="/home">Home</a>
       <a href="/register">Register</a>
       <a href="/login">Login</a>
       <a href="/delete">Delete</a>
    <script>
       document.getElementById('registerForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const userInput = document.getElementById('userInput').value;
          const pwInput = document.getElementById('pwInput').value;
          const roleInput = document.getElementById('roleInput').value;
          
          const response = await fetch('/register', {
             method: 'POST',
             headers: {'Content-Type': 'application/json'},
             body: JSON.stringify({username: userInput, password: pwInput, role: roleInput})
       });
       const result = await response.json();
       document.getElementById('message').textContent = result.message;
        document.getElementById('credentials').textContent = `${result.username}  ${result.password}`;
        document.getElementById('role').textContent = `${result.role}`;
     });
      </script>
   </body>
   
</html>
