{% extends "base.html" %}


{% block content %}
    <div class="container wide notes-layout">
        <div class="notes-main">
            <div class="notes-title-row">
                <input id="noteTitle" class="note-title-input" type="text" placeholder="my notes." />
            </div>

            <div class="note-input" id="noteInput">
                <div class="line-numbers-wrap">
                    <div class="line-numbers" id="lineNumbers">1</div>
                    <div id="noteContent" class="note-input-editor" contenteditable="true" placeholder="write your note here..." oninput="updateLineNumbers()"></div>
                </div>
                <div class="note-input-actions">
                    <div class="note-input-buttons">
                        <button id="addNoteBtn">add note</button>
                        <button id="cancelEditBtn" class="cancel-text" onclick="cancelEdit()">cancel</button>
                    </div>
                    <span id="messageInline" class="inline-message"></span>
                    <div class="rich-toolbar">
                        <div class="settings-select-wrap">
                            <button type="button" class="settings-select-btn" id="formatBtn" onclick="toggleFormatMenu(event)">format</button>
                            <div class="settings-select-menu share-menu" id="formatMenu">
                                <button type="button" class="share-option" onmousedown="event.preventDefault()" data-cmd="formatBlock" data-val="P" onclick="formatDoc('formatBlock', 'P'); closeFormatMenu()">paragraph</button>
                                <button type="button" class="share-option" onmousedown="event.preventDefault()" data-cmd="formatBlock" data-val="H1" onclick="formatDoc('formatBlock', 'H1'); closeFormatMenu()">heading 1</button>
                                <button type="button" class="share-option" onmousedown="event.preventDefault()" data-cmd="formatBlock" data-val="H2" onclick="formatDoc('formatBlock', 'H2'); closeFormatMenu()">heading 2</button>
                                <button type="button" class="share-option" onmousedown="event.preventDefault()" data-cmd="formatBlock" data-val="H3" onclick="formatDoc('formatBlock', 'H3'); closeFormatMenu()">heading 3</button>
                                <button type="button" class="share-option" onmousedown="event.preventDefault()" data-cmd="formatBlock" data-val="BLOCKQUOTE" onclick="formatDoc('formatBlock', 'BLOCKQUOTE'); closeFormatMenu()">quote</button>
                            </div>
                        </div>
                        <div class="rich-toolbar-divider"></div>
                        <button type="button" class="toolbar-btn" id="btn-bold" onmousedown="event.preventDefault()" onclick="formatDoc('bold')" title="bold">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
                        </button>
                        <button type="button" class="toolbar-btn" id="btn-italic" onmousedown="event.preventDefault()" onclick="formatDoc('italic')" title="italic">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
                        </button>
                        <button type="button" class="toolbar-btn" id="btn-underline" onmousedown="event.preventDefault()" onclick="formatDoc('underline')" title="underline">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"></path><line x1="4" y1="21" x2="20" y2="21"></line></svg>
                        </button>
                        <button type="button" class="toolbar-btn" id="btn-link" onmousedown="event.preventDefault()" onclick="openLinkModal()" title="insert link">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        </button>
                        <div class="rich-toolbar-divider"></div>
                        <button type="button" class="toolbar-btn" id="btn-unordered" onmousedown="event.preventDefault()" onclick="formatDoc('insertUnorderedList')" title="bullet list">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                                <line x1="9" y1="6" x2="20" y2="6"></line>
                                <line x1="9" y1="12" x2="20" y2="12"></line>
                                <line x1="9" y1="18" x2="20" y2="18"></line>
                                <circle cx="4" cy="6" r="1" fill="currentColor" stroke="none"></circle>
                                <circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"></circle>
                                <circle cx="4" cy="18" r="1" fill="currentColor" stroke="none"></circle>
                            </svg>
                        </button>
                        <button type="button" class="toolbar-btn" id="btn-ordered" onmousedown="event.preventDefault()" onclick="formatDoc('insertOrderedList')" title="numbered list">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                                <line x1="10" y1="6" x2="21" y2="6"></line>
                                <line x1="10" y1="12" x2="21" y2="12"></line>
                                <line x1="10" y1="18" x2="21" y2="18"></line>
                                <path d="M4 6h1v4"></path>
                                <path d="M4 10h2"></path>
                                <path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"></path>
                            </svg>
                        </button>
                        <div class="rich-toolbar-divider"></div>
                        <button type="button" class="toolbar-btn" id="btn-left" onmousedown="event.preventDefault()" onclick="formatDoc('justifyLeft')" title="align left">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>
                        </button>
                        <button type="button" class="toolbar-btn" id="btn-center" onmousedown="event.preventDefault()" onclick="formatDoc('justifyCenter')" title="align center">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="18" y1="10" x2="6" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="18" y1="18" x2="6" y2="18"></line></svg>
                        </button>
                        <button type="button" class="toolbar-btn" id="btn-right" onmousedown="event.preventDefault()" onclick="formatDoc('justifyRight')" title="align right">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="21" y1="10" x2="7" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="7" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <aside class="notes-sidebar" id="notesSidebar">
            <div class="notes-inbox">
                <div class="inbox-header">
                    <h2>inbox</h2>
                </div>
                <button class="share-request-item inbox-open-btn" onclick="openInboxModal()">
                    open inbox
                </button>
            </div>

            <div id="notesList" class="notes-list">
                <p>loading notes...</p>
            </div>
        </aside>
    </div>

    <div id="linkModal" class="share-modal" aria-hidden="true">
        <div class="share-panel link-modal-panel" role="dialog" aria-modal="true" aria-labelledby="linkTitle">
            <h2 id="linkTitle">insert link</h2>
            <p>enter the destination url.</p>
            <input id="linkInput" type="text" placeholder="https://example.com" />
            <div class="share-actions">
                <button class="icon-btn share-confirm-btn" onclick="confirmLink()">insert</button>
                <button class="icon-btn cancel-btn" onclick="closeLinkModal()">cancel</button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="delete-modal" aria-hidden="true">

        <div class="delete-panel" role="dialog" aria-modal="true" aria-labelledby="deleteTitle">
            <h2 id="deleteTitle">delete note?</h2>
            <p>this action cannot be undone.</p>
            <div class="delete-actions">
                <button class="icon-btn cancel-btn" onclick="closeDeleteModal()">cancel</button>
                <button class="icon-btn delete-btn" onclick="confirmDelete()">delete</button>
            </div>
        </div>
    </div>

    <div id="shareModal" class="share-modal" aria-hidden="true">
        <div class="share-panel" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
            <h2 id="shareTitle">share with user?</h2>
            <div class="share-preview is-collapsed" id="sharePreview"></div>
            <button class="link-btn" id="shareToggleBtn" onclick="toggleSharePreview()">show more</button>
            <div class="share-actions">
                <button class="icon-btn cancel-btn" onclick="closeShareModal()">cancel</button>
                <button class="icon-btn share-confirm-btn" onclick="confirmShare()">share</button>
            </div>
        </div>
    </div>

    <div id="shareEmailModal" class="share-modal" aria-hidden="true">
        <div class="share-panel" role="dialog" aria-modal="true" aria-labelledby="shareEmailTitle">
            <h2 id="shareEmailTitle">share via email</h2>
            <p>enter the recipient email.</p>
            <input id="shareEmailInput" type="email" placeholder="name@example.com" />
            <span id="shareEmailMessage" class="inline-message"></span>
            <div class="share-actions">
                <button class="icon-btn share-confirm-btn" onclick="confirmShareEmail()">continue</button>
                <button class="icon-btn cancel-btn" onclick="closeShareEmailModal()">cancel</button>
            </div>
        </div>
    </div>

    <div id="requestModal" class="share-modal" aria-hidden="true">
        <div class="share-panel" role="dialog" aria-modal="true" aria-labelledby="requestTitle">
            <h2 id="requestTitle">shared note</h2>
            <div class="share-preview" id="requestPreview"></div>
            <div class="share-actions">
                <button class="icon-btn accept-btn" onclick="confirmAccept()" title="accept share">accept</button>
                <button class="icon-btn reject-btn" onclick="confirmReject()" title="reject share">reject</button>
                <button class="icon-btn cancel-btn" onclick="closeShareRequestModal()">cancel</button>
            </div>
        </div>
    </div>

    <div id="downloadModal" class="share-modal" aria-hidden="true">
        <div class="share-panel" role="dialog" aria-modal="true" aria-labelledby="downloadTitle">
            <h2 id="downloadTitle">download note</h2>
            <p>choose your preferred format.</p>
            <div class="share-actions">
                <button class="icon-btn share-confirm-btn" onclick="performDownload('json')">.json</button>
                <button class="icon-btn share-confirm-btn" onclick="performDownload('txt')">.txt</button>
                <button class="icon-btn cancel-btn" onclick="closeDownloadModal()">cancel</button>
            </div>
        </div>
    </div>

    <script>
        function toggleFormatMenu(event) {
            event.stopPropagation();
            const menu = document.getElementById('formatMenu');
            // Close all other open menus first if any
            document.querySelectorAll('.settings-select-menu.open').forEach(m => {
                if (m !== menu) m.classList.remove('open');
            });
            menu.classList.toggle('open');
        }

        function closeFormatMenu() {
            const menu = document.getElementById('formatMenu');
            if (menu) menu.classList.remove('open');
        }

        function updateToolbarStates() {
            const commands = [
                { cmd: 'bold', id: 'btn-bold' },
                { cmd: 'italic', id: 'btn-italic' },
                { cmd: 'underline', id: 'btn-underline' },
                { cmd: 'insertUnorderedList', id: 'btn-unordered' },
                { cmd: 'insertOrderedList', id: 'btn-ordered' },
                { cmd: 'justifyLeft', id: 'btn-left' },
                { cmd: 'justifyCenter', id: 'btn-center' },
                { cmd: 'justifyRight', id: 'btn-right' }
            ];

            commands.forEach(c => {
                const btn = document.getElementById(c.id);
                if (btn) {
                    if (document.queryCommandState(c.cmd)) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });

            // Format Block check
            const formatBtn = document.getElementById('formatBtn');
            if (formatBtn) {
                const block = document.queryCommandValue('formatBlock').toLowerCase();
                if (['h1', 'h2', 'h3', 'blockquote'].includes(block)) {
                    formatBtn.classList.add('active');
                } else {
                    formatBtn.classList.remove('active');
                }
            }
        }

        function applyUISettings() {
            const list = document.getElementById('notesList');
            const editor = document.getElementById('noteContent');
            const noteInput = document.getElementById('noteInput');
            const editorWrap = document.querySelector('.line-numbers-wrap');
            
            list.classList.remove('grid-view');

            const fontSizeClass = `font-${userSettings.editor_font_size || 'medium'}`;
            
            if (editor) {
                editor.classList.remove('font-small', 'font-medium', 'font-large');
                editor.classList.add(fontSizeClass);
                editor.addEventListener('mouseup', updateToolbarStates);
                editor.addEventListener('keyup', updateToolbarStates);
            }
            if (editorWrap) {
                editorWrap.classList.remove('font-small', 'font-medium', 'font-large');
                editorWrap.classList.add(fontSizeClass);
            }

            if (userSettings.show_line_numbers) {
                noteInput.classList.add('show-line-numbers');
            } else {
                noteInput.classList.remove('show-line-numbers');
            }
            updateLineNumbers();
        }

        function formatDoc(cmd, value = null) {
            document.execCommand(cmd, false, value);
            updateToolbarStates();
            document.getElementById('noteContent').focus();
        }

        function openLinkModal() {
            const modal = document.getElementById('linkModal');
            const input = document.getElementById('linkInput');
            if (modal) {
                modal.classList.add('open');
                modal.setAttribute('aria-hidden', 'false');
                if (input) {
                    input.value = '';
                    input.focus();
                }
            }
        }

        function closeLinkModal() {
            const modal = document.getElementById('linkModal');
            if (modal) {
                modal.classList.remove('open');
                modal.setAttribute('aria-hidden', 'true');
            }
        }

        function confirmLink() {
            const url = document.getElementById('linkInput').value;
            if (url) {
                formatDoc('createLink', url);
            }
            closeLinkModal();
        }

        function updateLineNumbers() {
            const editor = document.getElementById('noteContent');
            const lineNumbers = document.getElementById('lineNumbers');
            if (!editor || !lineNumbers) return;

            // Sync gutter height to scrollHeight
            lineNumbers.style.height = editor.scrollHeight + 'px';

            if (userSettings.show_line_numbers) {
                let text = editor.innerText || '';
                // Handle trailing newline common in contenteditable
                if (text.endsWith('\n')) text = text.slice(0, -1);
                
                const lines = text.split('\n').length || 1;
                
                let html = '';
                for (let i = 1; i <= lines; i++) {
                    html += `<div>${i}</div>`;
                }
                lineNumbers.innerHTML = html;
            }
        }

        async function fetchNotes() {
            const response = await fetch('/api/notes');
            let notes = await response.json();
            const notesListDiv = document.getElementById('notesList');
            
            if (!Array.isArray(notes) || notes.length === 0) {
                notesListDiv.innerHTML = '<p>no notes found. add your first note!</p>';
                return;
            }

            // Apply sorting
            if (userSettings.sort_order === 'alpha') {
                notes.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
            } else if (userSettings.sort_order === 'created') {
                notes.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            } else {
                notes.sort((a, b) => new Date(b.modified_at) - new Date(a.modified_at));
            }

            let html = '';
            notes.forEach(note => {
                const sharedBadge = note.shared_from ? `<span class="shared-badge">shared by ${note.shared_from}</span>` : '';
                
                // Strip HTML for clean preview
                const plainText = (note.content || '').replace(/<[^>]*>/g, ' ');
                const titleText = note.title || plainText.split('\n')[0].substring(0, 30).trim() || userSettings.default_note_title || 'untitled';
                
                const escapedContent = (note.content || '').replace(/"/g, '&quot;');
                const escapedTitle = (note.title || '').replace(/"/g, '&quot;');
                
                html += `
                    <div class="note-item" 
                         id="note-item-${note._id}" 
                         data-title="${escapedTitle}" 
                         data-content="${escapedContent}"
                         onclick="startEdit('${note._id}')">
                        <div class="note-content">
                            ${sharedBadge}
                            <p class="note-title-preview">${titleText}</p>
                        </div>
                        <div class="note-actions">
                            <button onclick="event.stopPropagation(); activeNoteId='${note._id}'; openDeleteModal(activeNoteId)" class="icon-btn delete-btn" title="delete note">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>
                            </button>
                            <button class="icon-btn share-btn" onclick="event.stopPropagation(); shareNote('${note._id}')" title="share note">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                  <path d="M4 12v6a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-6" />
                                  <polyline points="16 6 12 2 8 6" />
                                  <line x1="12" y1="2" x2="12" y2="15" />
                                </svg>
                            </button>
                            <button class="icon-btn share-btn" onclick="event.stopPropagation(); openDownloadModal('${note._id}')" title="download note">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                  <path d="M4 12v6a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-6" />
                                  <polyline points="8 11 12 15 16 11" />
                                  <line x1="12" y1="15" x2="12" y2="2" />
                                </svg>
                            </button>
                            <div class="share-select-wrap is-hidden" data-note-id="${note._id}" onclick="event.stopPropagation()">
                                <div class="share-menu" id="share-menu-${note._id}" role="listbox" aria-label="share options" onclick="event.stopPropagation()">
                                    <button class="share-option" type="button" onclick="event.stopPropagation(); openShareEmailModal('${note._id}'); closeShareSelect('${note._id}')">enter email</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            notesListDiv.innerHTML = html;
        }

        let currentEditId = null;
        let inlineMessageTimer = null;

        function showInlineMessage(text, type) {
            const messageSpan = document.getElementById('messageInline');
            if (!messageSpan) return;
            messageSpan.textContent = text;
            messageSpan.className = 'inline-message ' + (type || '');
            if (inlineMessageTimer) clearTimeout(inlineMessageTimer);
            inlineMessageTimer = setTimeout(() => {
                messageSpan.textContent = '';
                messageSpan.className = 'inline-message';
            }, 3000);
        }

        function startEdit(noteId) {
            const item = document.getElementById(`note-item-${noteId}`);
            if (!item) return;
            const input = document.getElementById('noteContent');
            const titleInput = document.getElementById('noteTitle');
            const addBtn = document.getElementById('addNoteBtn');
            const form = document.getElementById('noteInput');
            currentEditId = noteId;
            input.innerHTML = item.dataset.content || '';
            if (titleInput) titleInput.value = item.dataset.title || '';
            input.focus();
            updateLineNumbers();
            updateToolbarStates();
            addBtn.textContent = 'save';
            if (form) form.classList.add('is-editing');

            const sidebar = document.getElementById('notesSidebar');
            const menuBtn = document.getElementById('notesMenuBtn');
            const notesMain = document.querySelector('.notes-main');
            if (sidebar && menuBtn) {
                sidebar.classList.remove('is-open');
                menuBtn.classList.remove('is-open');
            }
            if (notesMain) notesMain.classList.remove('menu-open');
        }

        function cancelEdit() {
            const input = document.getElementById('noteContent');
            const titleInput = document.getElementById('noteTitle');
            const addBtn = document.getElementById('addNoteBtn');
            const form = document.getElementById('noteInput');
            currentEditId = null;
            input.innerHTML = '';
            if (titleInput) titleInput.value = '';
            addBtn.textContent = 'add note';
            updateLineNumbers();
            updateToolbarStates();
            if (form) form.classList.remove('is-editing');
        }

        document.getElementById('addNoteBtn').onclick = async () => {
            const content = document.getElementById('noteContent').innerHTML;
            let title = document.getElementById('noteTitle')?.value || '';

            if (!content || content === '<br>') {
                showInlineMessage("note cannot be empty", 'error');
                return;
            }

            if (!title.trim() && !currentEditId) {
                title = userSettings.default_note_title || 'untitled';
            }

            try {
                const endpoint = currentEditId ? `/api/notes/${currentEditId}` : '/api/notes';
                const method = currentEditId ? 'PUT' : 'POST';
                const response = await fetch(endpoint, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, content: content })
                });
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('noteContent').innerHTML = '';
                    const titleInput = document.getElementById('noteTitle');
                    if (titleInput) titleInput.value = '';
                    fetchNotes();
                    showInlineMessage(result.message, 'success');
                    if (currentEditId) {
                        cancelEdit();
                    }
                } else {
                    showInlineMessage(result.message, 'error');
                }
            } catch (error) {
                showInlineMessage('an error occurred.', 'error');
            }
        };




        let activeNoteId = null;
        let isDeleteOpen = false;

        function openDeleteModal(noteId) {
            activeNoteId = noteId;
            const modal = document.getElementById('deleteModal');
            if (!modal) return;
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            isDeleteOpen = true;
        }

        function closeDeleteModal() {
            const modal = document.getElementById('deleteModal');
            if (!modal) return;
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            isDeleteOpen = false;
        }

        async function confirmDelete() {
            if (!activeNoteId) return;
            await deleteNote(activeNoteId);
            closeDeleteModal();
        }

        async function deleteNote(noteId) {
            
            try {
                const response = await fetch(`/api/notes/${noteId}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    fetchNotes();
                }
            } catch (error) {
                console.error('Error deleting note:', error);
            }
        }

        let activeShareRequest = null;
        window._shareRequests = [];

        function openShareRequestModal(request) {
            activeShareRequest = request;
            const modal = document.getElementById('requestModal');
            const title = document.getElementById('requestTitle');
            const preview = document.getElementById('requestPreview');
            if (!modal) return;
            if (title && request?.owner) {
                title.textContent = `${request.owner} shared a note`;
            }
            if (preview) {
                preview.textContent = request?.note_content || '';
            }
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeShareRequestModal() {
            const modal = document.getElementById('requestModal');
            if (!modal) return;
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
        }

        function openShareRequestModalByIndex(index) {
            const req = (window._shareRequests || [])[index];
            if (!req) return;
            openShareRequestModal(req);
        }

        async function confirmAccept() {
            if (!activeShareRequest) return;
            await acceptShare(activeShareRequest._id);
            closeShareRequestModal();
        }

        async function confirmReject() {
            if (!activeShareRequest) return;
            await rejectShare(activeShareRequest._id);
            closeShareRequestModal();
        }

        let _openedNotificationRequest = false;

        async function fetchShareRequests() {
            const response = await fetch('/api/notes/requests');
            const requests = await response.json();
            window._shareRequests = requests || [];

            const shouldOpenFromNotification = !_openedNotificationRequest && new URLSearchParams(window.location.search).get('openShareRequest') === '1';
            if (shouldOpenFromNotification) {
                _openedNotificationRequest = true;
                openShareRequestModalByIndex(0);
                window.history.replaceState({}, '', window.location.pathname);
            }
        }

        async function fetchOutgoingRequests() {
            const response = await fetch('/api/notes/requests/outgoing');
            const requests = await response.json();
            window._outgoingRequests = requests || [];
        }

        async function acceptShare(requestId) {
            const response = await fetch(`/api/notes/requests/${requestId}/accept`, { method: 'POST' });
            if (response.ok) {
                fetchNotes();
                fetchShareRequests();
            }
        }

        async function rejectShare(requestId) {
            const response = await fetch(`/api/notes/requests/${requestId}/reject`, { method: 'POST' });
            if (response.ok) {
                fetchShareRequests();
            }
        }

        let pendingShare = { noteId: null, recipient: '' };
        let isShareOpen = false;
        let pendingEmailNoteId = null;
        let shareEmailMessageTimer = null;

        function showShareEmailMessage(text, type) {
            const message = document.getElementById('shareEmailMessage');
            if (!message) return;
            message.textContent = text;
            message.className = 'inline-message ' + (type || '');
            if (shareEmailMessageTimer) clearTimeout(shareEmailMessageTimer);
            shareEmailMessageTimer = setTimeout(() => {
                message.textContent = '';
                message.className = 'inline-message';
            }, 3000);
        }

        function openShareSelect(noteId) {
            const wrap = document.querySelector(`.share-select-wrap[data-note-id="${noteId}"]`);
            if (!wrap) return;
            wrap.classList.remove('is-hidden');
            wrap.classList.add('is-open');
        }

        function closeShareSelect(noteId) {
            const wrap = document.querySelector(`.share-select-wrap[data-note-id="${noteId}"]`);
            if (!wrap) return;
            wrap.classList.remove('is-open');
            wrap.classList.add('is-hidden');
        }

        function openShareModal(noteId, recipient) {
            pendingShare = { noteId, recipient };
            const modal = document.getElementById('shareModal');
            const title = document.getElementById('shareTitle');
            const preview = document.getElementById('sharePreview');
            const toggleBtn = document.getElementById('shareToggleBtn');
            if (!modal) return;
            if (title) {
                title.textContent = recipient ? `share with ${recipient}?` : 'share with user?';
            }
            if (preview) {
                const item = document.getElementById(`note-item-${noteId}`);
                preview.textContent = item ? (item.dataset.content || '') : '';
                preview.classList.add('is-collapsed');
            }
            if (toggleBtn) {
                toggleBtn.textContent = 'show more';
                toggleBtn.style.display = 'none';
            }
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            isShareOpen = true;

            setTimeout(() => {
                if (!preview || !toggleBtn) return;
                if (!preview.textContent) {
                    toggleBtn.style.display = 'none';
                    return;
                }
                const styles = window.getComputedStyle(preview);
                let lineHeight = parseFloat(styles.lineHeight);
                if (Number.isNaN(lineHeight)) {
                    const fontSize = parseFloat(styles.fontSize) || 14;
                    lineHeight = fontSize * 1.6;
                }
                const maxCollapsed = lineHeight * 3 + 1;
                toggleBtn.style.display = preview.scrollHeight > maxCollapsed ? 'inline-flex' : 'none';
            }, 0);
        }

        function toggleSharePreview() {
            const preview = document.getElementById('sharePreview');
            const toggleBtn = document.getElementById('shareToggleBtn');
            if (!preview || !toggleBtn) return;
            const isCollapsed = preview.classList.toggle('is-collapsed');
            toggleBtn.textContent = isCollapsed ? 'show more' : 'show less';
            toggleBtn.blur();
        }

        function closeShareModal() {
            const modal = document.getElementById('shareModal');
            if (!modal) return;
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            isShareOpen = false;
        }

        function openShareEmailModal(noteId) {
            pendingEmailNoteId = noteId;
            const modal = document.getElementById('shareEmailModal');
            const input = document.getElementById('shareEmailInput');
            const message = document.getElementById('shareEmailMessage');
            if (!modal) return;
            if (input) input.value = '';
            if (message) {
                message.textContent = '';
                message.className = 'inline-message';
            }
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            if (input) input.focus();
        }

        function closeShareEmailModal() {
            const modal = document.getElementById('shareEmailModal');
            if (!modal) return;
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
        }

        async function confirmShareEmail() {
            const input = document.getElementById('shareEmailInput');
            const message = document.getElementById('shareEmailMessage');
            const email = (input?.value || '').trim().toLowerCase();
            if (!email) {
                showShareEmailMessage('please enter an email.', 'error');
                return;
            }

            try {
                const response = await fetch(`/api/users/lookup?email=${encodeURIComponent(email)}`);
                const result = await response.json();
                if (!response.ok) {
                    showShareEmailMessage(result.message || 'user not found.', 'error');
                    return;
                }
                closeShareEmailModal();
                if (pendingEmailNoteId) {
                    openShareModal(pendingEmailNoteId, result.username);
                }
            } catch (error) {
                showShareEmailMessage('an error occurred.', 'error');
            }
        }

        async function confirmShare() {
            const { noteId, recipient } = pendingShare;
            if (!noteId || !recipient) return;
            await performShare(noteId, recipient);
            closeShareModal();
        }

        async function shareNote(noteId, forcedRecipient) {
            if (forcedRecipient) {
                openShareModal(noteId, forcedRecipient);
                return;
            }
            openShareSelect(noteId);
        }

        async function performShare(noteId, recipient) {
            const wrap = document.querySelector(`.share-select-wrap[data-note-id="${noteId}"]`);

            try {
                const response = await fetch('/api/notes/share', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note_id: noteId, recipient: recipient })
                });
                const result = await response.json();

                showInlineMessage(result.message, response.ok ? 'success' : 'error');

                if (response.ok && wrap) {
                    wrap.classList.remove('is-open');
                    wrap.classList.add('is-hidden');
                }
            } catch (error) {
                showInlineMessage('an error occurred.', 'error');
            }
        }

        let pendingDownloadId = null;

        function openDownloadModal(noteId) {
            pendingDownloadId = noteId;
            const modal = document.getElementById('downloadModal');
            if (modal) {
                modal.classList.add('open');
                modal.setAttribute('aria-hidden', 'false');
            }
        }

        function closeDownloadModal() {
            const modal = document.getElementById('downloadModal');
            if (modal) {
                modal.classList.remove('open');
                modal.setAttribute('aria-hidden', 'true');
            }
            pendingDownloadId = null;
        }

        function performDownload(format) {
            const item = document.getElementById(`note-item-${pendingDownloadId}`);
            if (!item) return;

            const title = item.dataset.title || 'untitled';
            const content = item.dataset.content || '';
            let blob, filename;

                if (format === 'json') {
                    const data = { title, content, downloaded_at: new Date().toISOString() };
                    blob = new Blob([JSON.stringify(data, null, 4)], { type: 'application/json' });
                    filename = `${title.replace(/\s+/g, '_')}.json`;
              } else {
                    const text = `${title}\n${'='.repeat(title.length)}\n\n${content}`;
                    blob = new Blob([text], { type: 'text/plain' });
                    filename = `${title.replace(/\s+/g, '_')}.txt`;
                }
                
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            closeDownloadModal();
        }

        async function initPage() {
            await fetchNotes();
            fetchShareRequests();
            fetchOutgoingRequests();
        }


        const menuBtn = document.getElementById('notesMenuBtn');
        const sidebar = document.getElementById('notesSidebar');
        const notesMain = document.querySelector('.notes-main');
        if (menuBtn && sidebar) {
            menuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('is-open');
                menuBtn.classList.toggle('is-open');
                if (notesMain) notesMain.classList.toggle('menu-open', sidebar.classList.contains('is-open'));
            });
            document.addEventListener('click', (e) => {
                if (!sidebar.classList.contains('is-open')) return;
                const isMenuBtn = e.target.closest('#notesMenuBtn');
                const isSidebar = e.target.closest('#notesSidebar');
                if (isMenuBtn || isSidebar) return;
                sidebar.classList.remove('is-open');
                menuBtn.classList.remove('is-open');
                if (notesMain) notesMain.classList.remove('menu-open');
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isDeleteOpen) {
                closeDeleteModal();
            }
            if (e.key === 'Escape' && isShareOpen) {
                closeShareModal();
            }
            if (e.key === 'Escape') {
                closeShareRequestModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeShareEmailModal();
            }
        });

        document.addEventListener('click', (e) => {
            const shareBtn = e.target.closest('.share-btn');
            const shareMenu = e.target.closest('.share-menu');
            const shareWrap = e.target.closest('.share-select-wrap');
            if (shareBtn || shareMenu || shareWrap) return;
            document.querySelectorAll('.share-select-wrap.is-open').forEach(wrap => {
                wrap.classList.remove('is-open');
                wrap.classList.add('is-hidden');
            });
        });
    loadUserSettings().then(() => {
        applyUISettings();
        initPage();
    });
    </script>
{% endblock %}
