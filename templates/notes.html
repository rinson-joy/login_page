{% extends "base.html" %}

{% block title %}{{ name }}{% endblock %}

{% block content %}
    <div class="container wide notes-layout">
        <div class="notes-main">
            <div class="notes-title-row">
                <input id="noteTitle" class="note-title-input" type="text" placeholder="my notes." />
            </div>

            <div class="note-input" id="noteInput">
                <textarea id="noteContent" placeholder="write your note here..." rows="4"></textarea>
                <div class="note-input-actions">
                    <div class="note-input-buttons">
                        <button id="addNoteBtn">add note</button>
                        <button id="cancelEditBtn" class="cancel-text" onclick="cancelEdit()">cancel</button>
                    </div>
                    <span id="messageInline" class="inline-message"></span>
                    <span class="note-input-spacer" aria-hidden="true"></span>
                </div>
            </div>
        </div>

        <aside class="notes-sidebar" id="notesSidebar">
            <div class="notes-inbox">
                <div class="inbox-header">
                    <h2>inbox</h2>
                </div>
                <div id="shareRequests" class="share-requests">
                    <p>loading share requests...</p>
                </div>
            </div>

            <div id="notesList" class="notes-list">
                <p>loading notes...</p>
            </div>
        </aside>
    </div>

    <div id="deleteModal" class="delete-modal" aria-hidden="true">
        <div class="delete-panel" role="dialog" aria-modal="true" aria-labelledby="deleteTitle">
            <h2 id="deleteTitle">delete note?</h2>
            <p>this action cannot be undone.</p>
            <div class="delete-actions">
                <button class="icon-btn cancel-delete-btn" onclick="closeDeleteModal()">cancel</button>
                <button class="icon-btn delete-btn" onclick="confirmDelete()">delete</button>
            </div>
        </div>
    </div>

    <div id="shareModal" class="share-modal" aria-hidden="true">
        <div class="share-panel" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
            <h2 id="shareTitle">share with user?</h2>
            <div class="share-preview is-collapsed" id="sharePreview"></div>
            <button class="link-btn" id="shareToggleBtn" onclick="toggleSharePreview()">show more</button>
            <div class="share-actions">
                <button class="icon-btn cancel-delete-btn" onclick="closeShareModal()">cancel</button>
                <button class="icon-btn share-confirm-btn" onclick="confirmShare()">share</button>
            </div>
        </div>
    </div>

    <div id="requestModal" class="share-modal" aria-hidden="true">
        <div class="share-panel" role="dialog" aria-modal="true" aria-labelledby="requestTitle">
            <h2 id="requestTitle">shared note</h2>
            <div class="share-preview" id="requestPreview"></div>
            <div class="share-actions">
                <button class="icon-btn accept-btn" onclick="confirmAccept()" title="accept share">accept</button>
                <button class="icon-btn reject-btn" onclick="confirmReject()" title="reject share">reject</button>
                <button class="icon-btn cancel-delete-btn" onclick="closeShareRequestModal()">cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        async function fetchNotes() {
            const response = await fetch('/api/notes');
            const notes = await response.json();
            const notesListDiv = document.getElementById('notesList');
            
            if (notes.length === 0) {
                notesListDiv.innerHTML = '<p>no notes found. add your first note!</p>';
                return;
            }

            let html = '';
            notes.forEach(note => {
                const sharedBadge = note.shared_from ? `<span class="shared-badge">shared by ${note.shared_from}</span>` : '';
                const titleText = note.title || (note.content || '').split('\n')[0] || 'untitled';
                html += `
                    <div class="note-item" id="note-item-${note._id}" data-title="${titleText}" data-content="${(note.content || '').replace(/"/g, '&quot;')}" onclick="startEdit('${note._id}')">
                        <div class="note-content">
                            ${sharedBadge}
                            <p id="note-text-${note._id}">${titleText}</p>
                        </div>
                        <div class="note-actions">
                            <button onclick="event.stopPropagation(); activeNoteId='${note._id}'; openDeleteModal(activeNoteId)" class="icon-btn delete-btn" title="delete note">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>
                            </button>
                            <button class="icon-btn share-btn" onclick="event.stopPropagation(); shareNote('${note._id}')" title="share note">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                  <path d="M4 12v6a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-6" />
                                  <polyline points="16 6 12 2 8 6" />
                                  <line x1="12" y1="2" x2="12" y2="15" />
                                </svg>
                            </button>
                            <div class="share-select-wrap is-hidden" data-note-id="${note._id}" onclick="event.stopPropagation()">
                                <div class="share-menu" id="share-menu-${note._id}" role="listbox" aria-label="share with user" onclick="event.stopPropagation()"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
            notesListDiv.innerHTML = html;
        }

        let currentEditId = null;
        let inlineMessageTimer = null;

        function showInlineMessage(text, type) {
            const messageSpan = document.getElementById('messageInline');
            if (!messageSpan) return;
            messageSpan.textContent = text;
            messageSpan.className = 'inline-message ' + (type || '');
            if (inlineMessageTimer) clearTimeout(inlineMessageTimer);
            inlineMessageTimer = setTimeout(() => {
                messageSpan.textContent = '';
                messageSpan.className = 'inline-message';
            }, 3000);
        }

        function startEdit(noteId) {
            const item = document.getElementById(`note-item-${noteId}`);
            if (!item) return;
            const input = document.getElementById('noteContent');
            const titleInput = document.getElementById('noteTitle');
            const addBtn = document.getElementById('addNoteBtn');
            const form = document.getElementById('noteInput');
            currentEditId = noteId;
            input.value = item.dataset.content || '';
            if (titleInput) titleInput.value = item.dataset.title || '';
            input.focus();
            addBtn.textContent = 'save';
            if (form) form.classList.add('is-editing');

            const sidebar = document.getElementById('notesSidebar');
            const menuBtn = document.getElementById('notesMenuBtn');
            const notesMain = document.querySelector('.notes-main');
            if (sidebar && menuBtn) {
                sidebar.classList.remove('is-open');
                menuBtn.classList.remove('is-open');
            }
            if (notesMain) notesMain.classList.remove('menu-open');
        }

        function cancelEdit() {
            const input = document.getElementById('noteContent');
            const titleInput = document.getElementById('noteTitle');
            const addBtn = document.getElementById('addNoteBtn');
            const form = document.getElementById('noteInput');
            currentEditId = null;
            input.value = '';
            if (titleInput) titleInput.value = '';
            addBtn.textContent = 'add note';
            if (form) form.classList.remove('is-editing');
        }

        document.getElementById('addNoteBtn').onclick = async () => {
            const content = document.getElementById('noteContent').value;
            const title = document.getElementById('noteTitle')?.value || '';

            if (!content) {
                showInlineMessage("note cannot be empty", 'error');
                return;
            }

            try {
                const endpoint = currentEditId ? `/api/notes/${currentEditId}` : '/api/notes';
                const method = currentEditId ? 'PUT' : 'POST';
                const response = await fetch(endpoint, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, content: content })
                });
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('noteContent').value = '';
                    const titleInput = document.getElementById('noteTitle');
                    if (titleInput) titleInput.value = '';
                    fetchNotes();
                    showInlineMessage(result.message, 'success');
                    if (currentEditId) {
                        cancelEdit();
                    }
                } else {
                    showInlineMessage(result.message, 'error');
                }
            } catch (error) {
                showInlineMessage('an error occurred.', 'error');
            }
        };

        let activeNoteId = null;
        let isDeleteOpen = false;

        function openDeleteModal(noteId) {
            activeNoteId = noteId;
            const modal = document.getElementById('deleteModal');
            if (!modal) return;
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            isDeleteOpen = true;
        }

        function closeDeleteModal() {
            const modal = document.getElementById('deleteModal');
            if (!modal) return;
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            isDeleteOpen = false;
        }

        async function confirmDelete() {
            if (!activeNoteId) return;
            await deleteNote(activeNoteId);
            closeDeleteModal();
        }

        async function deleteNote(noteId) {
            
            try {
                const response = await fetch(`/api/notes/${noteId}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    fetchNotes();
                }
            } catch (error) {
                console.error('Error deleting note:', error);
            }
        }

        let activeShareRequest = null;
        window._shareRequests = [];

        function openShareRequestModal(request) {
            activeShareRequest = request;
            const modal = document.getElementById('requestModal');
            const title = document.getElementById('requestTitle');
            const preview = document.getElementById('requestPreview');
            if (!modal) return;
            if (title && request?.owner) {
                title.textContent = `${request.owner} shared a note`;
            }
            if (preview) {
                preview.textContent = request?.note_content || '';
            }
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeShareRequestModal() {
            const modal = document.getElementById('requestModal');
            if (!modal) return;
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
        }

        function openShareRequestModalByIndex(index) {
            const req = (window._shareRequests || [])[index];
            if (!req) return;
            openShareRequestModal(req);
        }

        async function confirmAccept() {
            if (!activeShareRequest) return;
            await acceptShare(activeShareRequest._id);
            closeShareRequestModal();
        }

        async function confirmReject() {
            if (!activeShareRequest) return;
            await rejectShare(activeShareRequest._id);
            closeShareRequestModal();
        }

        async function fetchShareRequests() {
            const response = await fetch('/api/notes/requests');
            const requests = await response.json();
            const shareRequestsDiv = document.getElementById('shareRequests');
            window._shareRequests = requests || [];

            if (!requests.length) {
                shareRequestsDiv.innerHTML = '<p>no share requests.</p>';
                return;
            }

            let html = '';
            requests.forEach((req, idx) => {
                html += `
                    <div class="share-request">
                        <button class="share-request-item" onclick='openShareRequestModalByIndex(${idx})'>
                            <span class="shared-badge">${req.owner} shared a note</span>
                        </button>
                    </div>
                `;
            });
            shareRequestsDiv.innerHTML = html;
        }

        async function acceptShare(requestId) {
            const response = await fetch(`/api/notes/requests/${requestId}/accept`, { method: 'POST' });
            if (response.ok) {
                fetchNotes();
                fetchShareRequests();
            }
        }

        async function rejectShare(requestId) {
            const response = await fetch(`/api/notes/requests/${requestId}/reject`, { method: 'POST' });
            if (response.ok) {
                fetchShareRequests();
            }
        }

        function openShareSelect(noteId) {
            const wrap = document.querySelector(`.share-select-wrap[data-note-id="${noteId}"]`);
            if (!wrap) return;
            wrap.classList.remove('is-hidden');
            wrap.classList.add('is-open');
            const menu = wrap.querySelector('.share-menu');
            if (menu) {
                const first = menu.querySelector('.share-option');
                if (first) {
                    setHoveredShareOption(first);
                }
            }
        }

        let pendingShare = { noteId: null, recipient: '' };
        let isShareOpen = false;

        function openShareModal(noteId, recipient) {
            pendingShare = { noteId, recipient };
            const modal = document.getElementById('shareModal');
            const title = document.getElementById('shareTitle');
            const preview = document.getElementById('sharePreview');
            const toggleBtn = document.getElementById('shareToggleBtn');
            if (!modal) return;
            if (title) {
                title.textContent = recipient ? `share with ${recipient}?` : 'share with user?';
            }
            if (preview) {
                const item = document.getElementById(`note-item-${noteId}`);
                preview.textContent = item ? (item.dataset.content || '') : '';
                preview.classList.add('is-collapsed');
            }
            if (toggleBtn) {
                toggleBtn.textContent = 'show more';
                toggleBtn.style.display = 'none';
            }
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            isShareOpen = true;

            setTimeout(() => {
                if (!preview || !toggleBtn) return;
                if (!preview.textContent) {
                    toggleBtn.style.display = 'none';
                    return;
                }
                const styles = window.getComputedStyle(preview);
                let lineHeight = parseFloat(styles.lineHeight);
                if (Number.isNaN(lineHeight)) {
                    const fontSize = parseFloat(styles.fontSize) || 14;
                    lineHeight = fontSize * 1.6;
                }
                const maxCollapsed = lineHeight * 3 + 1;
                toggleBtn.style.display = preview.scrollHeight > maxCollapsed ? 'inline-flex' : 'none';
            }, 0);
        }

        function toggleSharePreview() {
            const preview = document.getElementById('sharePreview');
            const toggleBtn = document.getElementById('shareToggleBtn');
            if (!preview || !toggleBtn) return;
            const isCollapsed = preview.classList.toggle('is-collapsed');
            toggleBtn.textContent = isCollapsed ? 'show more' : 'show less';
            toggleBtn.blur();
        }

        function closeShareModal() {
            const modal = document.getElementById('shareModal');
            if (!modal) return;
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            isShareOpen = false;
        }

        async function confirmShare() {
            const { noteId, recipient } = pendingShare;
            if (!noteId || !recipient) return;
            await performShare(noteId, recipient);
            closeShareModal();
        }

        async function shareNote(noteId, forcedRecipient) {
            if (!forcedRecipient) {
                openShareSelect(noteId);
                return;
            }

            openShareModal(noteId, forcedRecipient);
        }

        async function performShare(noteId, recipient) {
            const wrap = document.querySelector(`.share-select-wrap[data-note-id="${noteId}"]`);

            try {
                const response = await fetch('/api/notes/share', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note_id: noteId, recipient: recipient })
                });
                const result = await response.json();

                showInlineMessage(result.message, response.ok ? 'success' : 'error');

                if (response.ok && wrap) {
                    wrap.classList.remove('is-open');
                    wrap.classList.add('is-hidden');
                }
            } catch (error) {
                showInlineMessage('an error occurred.', 'error');
            }
        }

        async function fetchUsers() {
            const response = await fetch('/api/users');
            const users = await response.json();
            window._shareUsers = users.map(u => u.username).filter(Boolean);
        }

        function hydrateShareSelects() {
            const wraps = document.querySelectorAll('.share-select-wrap');
            wraps.forEach(wrap => {
                const menu = wrap.querySelector('.share-menu');
                if (!menu) return;
                let items = '';
                (window._shareUsers || []).forEach(username => {
                    items += `<button class="share-option" type="button" data-username="${username}" onclick="event.stopPropagation(); shareNote(this.closest('.share-select-wrap').dataset.noteId, this.dataset.username)">${username}</button>`;
                });
                menu.innerHTML = items;
            });
        }

        function setHoveredShareOption(optionEl) {
            const menu = optionEl.closest('.share-menu');
            if (!menu) return;
            const prev = menu.querySelector('.share-option.is-hovered');
            if (prev) prev.classList.remove('is-hovered');
            optionEl.classList.add('is-hovered');
        }

        async function initPage() {
            await fetchUsers();
            await fetchNotes();
            fetchShareRequests();
            hydrateShareSelects();
        }

        const _origFetchNotes = fetchNotes;
        fetchNotes = async () => {
            await _origFetchNotes();
            hydrateShareSelects();
        };

        initPage();

        const menuBtn = document.getElementById('notesMenuBtn');
        const sidebar = document.getElementById('notesSidebar');
        const notesMain = document.querySelector('.notes-main');
        if (menuBtn && sidebar) {
            menuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('is-open');
                menuBtn.classList.toggle('is-open');
                if (notesMain) notesMain.classList.toggle('menu-open', sidebar.classList.contains('is-open'));
            });
            document.addEventListener('click', (e) => {
                if (!sidebar.classList.contains('is-open')) return;
                const isMenuBtn = e.target.closest('#notesMenuBtn');
                const isSidebar = e.target.closest('#notesSidebar');
                if (isMenuBtn || isSidebar) return;
                sidebar.classList.remove('is-open');
                menuBtn.classList.remove('is-open');
                if (notesMain) notesMain.classList.remove('menu-open');
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isDeleteOpen) {
                closeDeleteModal();
            }
            if (e.key === 'Escape' && isShareOpen) {
                closeShareModal();
            }
            if (e.key === 'Escape') {
                closeShareRequestModal();
            }
        });

        document.addEventListener('mouseover', (e) => {
            const option = e.target.closest('.share-option');
            if (!option) return;
            setHoveredShareOption(option);
        });

        document.addEventListener('click', (e) => {
            const shareBtn = e.target.closest('.share-btn');
            const shareMenu = e.target.closest('.share-menu');
            const shareWrap = e.target.closest('.share-select-wrap');
            if (shareBtn || shareMenu || shareWrap) return;
            document.querySelectorAll('.share-select-wrap.is-open').forEach(wrap => {
                wrap.classList.remove('is-open');
                wrap.classList.add('is-hidden');
            });
        });
    </script>
{% endblock %}
